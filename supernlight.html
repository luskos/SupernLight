<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupernityLight | Professional Mobile Editing</title>
    <style>
        :root {
            --accent: #ffffff;
            --primary: #007AFF;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden; /* Забранява скрола на десктоп */
        }

        /* Динамичен фон */
        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Тук ще сложиш твоята снимка */
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), 
                        url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.8);
        }

        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        /* Лого */
        .logo-area {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 14px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0,122,255,0.4);
        }

        /* Централна част */
        .content-box {
            max-width: 500px;
            backdrop-filter: blur(10px);
            background: var(--glass);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 2.5rem; margin-bottom: 15px; }
        p { font-size: 1.1rem; color: #ccc; margin-bottom: 25px; line-height: 1.4; }

        /* QR Секция */
        .qr-wrapper {
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .qr-wrapper img {
            display: block;
            width: 180px;
            height: 180px;
        }

        .download-hint {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            font-weight: bold;
        }

        footer {
            font-size: 0.8rem;
            opacity: 0.5;
        }

        /* Mobile Friendly корекции */
        @media (max-width: 768px) {
            body, html { overflow-y: auto; } /* Позволява скрол на телефон */
            .main-container { height: auto; min-height: 100vh; }
            h1 { font-size: 2rem; }
            .content-box { margin: 20px 0; }
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <main class="main-container">
        <header class="logo-area">
            <div class="logo-icon">S</div>
            <div>SupernityLight</div>
        </header>

        <section class="content-box">
            <h1>Master Your Light</h1>
            <p>Следващото поколение мобилна обработка. Превърни всеки кадър в шедьовър с AI прецизност.</p>
            
            <div class="qr-wrapper">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://supernitylight.com/buy" alt="QR Code">
            </div>
            <div class="download-hint">СКАНИРАЙ И ВЗЕМИ</div>
        </section>

        <footer>
            &copy; 2026 SupernityLight. Simple. Fast. Powerful.
        </footer>
    </main>

    <script>
        // Предотвратява скролването с мишката на десктоп за по-чисто усещане
        window.addEventListener('wheel', function(e) {
            if(window.innerWidth > 768) {
                e.preventDefault();
            }
        }, { passive: false });

        // Бърза анимация при зареждане
        document.addEventListener('DOMContentLoaded', () => {
            const content = document.querySelector('.content-box');
            content.style.opacity = 0;
            content.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                content.style.transition = 'all 0.8s ease-out';
                content.style.opacity = 1;
                content.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
